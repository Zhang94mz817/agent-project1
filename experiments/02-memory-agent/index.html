<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f8fb;
    --bg-secondary: #ffffff;
    --surface: #ffffff;
    --surface-hover: #f1f5f9;
    --border: #d8e1ec;
    --text: #18212f;
    --text-secondary: #526072;
    --text-muted: #7a8797;
    --accent: #2563eb;
    --accent-dim: #1d4ed8;
    --tool-bg: #f7faff;
    --tool-border: #d7e6ff;
    --success: #16a34a;
    --error: #dc2626;
    --warning: #d97706;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header, .sidebar-section, .sidebar-actions { padding: 18px 20px; }
  .sidebar-header, .sidebar-section { border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { font-size: 18px; margin-bottom: 4px; }
  .sidebar-header .subtitle { font-size: 12px; color: var(--text-secondary); }
  .sidebar-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .status-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 6px 0;
    font-size: 13px;
  }

  .status-item .label { color: var(--text-secondary); }
  .status-item .value { color: var(--text); font-weight: 500; text-align: right; }
  .status-item .value.small {
    font-size: 11px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .memory-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .memory-empty {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .memory-item {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    overflow: hidden;
  }

  .memory-item summary {
    list-style: none;
    cursor: pointer;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .memory-item summary::-webkit-details-marker { display: none; }

  .memory-item summary:hover {
    background: var(--surface-hover);
  }

  .memory-item-title {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .memory-item-key {
    font-size: 12px;
    color: var(--text-muted);
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .memory-item-value {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    word-break: break-word;
  }

  .memory-item-arrow {
    color: var(--text-muted);
    font-size: 12px;
    flex-shrink: 0;
  }

  .memory-item[open] .memory-item-arrow {
    transform: rotate(90deg);
  }

  .memory-item-body {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.6;
    background: #fbfdff;
  }

  .memory-item-body .line + .line {
    margin-top: 4px;
  }

  .memory-item-body strong {
    color: var(--text);
  }

  .memory-item-body code {
    background: #eef2f7;
    padding: 1px 5px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .memory-help {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }

  .connection-dot.connected { background: var(--success); }
  .connection-dot.disconnected { background: var(--error); }
  .connection-dot.connecting { background: var(--warning); }

  .tool-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  .tool-icon { width: 20px; text-align: center; color: var(--accent); }
  .tool-name { font-weight: 500; font-size: 12px; font-family: "SF Mono", "Fira Code", monospace; }
  .tool-desc { color: var(--text-secondary); font-size: 11px; margin-top: 2px; }

  .btn {
    display: block;
    width: 100%;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
  }

  .btn:hover { background: var(--surface-hover); }
  .btn-danger { border-color: #f3c2c2; color: var(--error); background: #fff5f5; }
  .btn-danger:hover { background: #feecec; }
  .btn-summarize { border-color: #c7d9f8; color: var(--accent); background: #f0f6ff; }
  .btn-summarize:hover { background: #e4efff; }
  .btn-summarize:disabled { opacity: 0.4; cursor: not-allowed; }

  .skill-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 13px;
    gap: 8px;
  }
  .skill-info { min-width: 0; flex: 1; }
  .skill-name { font-weight: 500; font-size: 12px; font-family: "SF Mono", "Fira Code", monospace; }
  .skill-desc { color: var(--text-secondary); font-size: 11px; margin-top: 2px; }

  .toggle-switch { flex-shrink: 0; position: relative; width: 34px; height: 18px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #c8d1db;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }

  .system-msg {
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 6px 24px;
  }
  .system-msg-inner {
    background: #f0f6ff;
    border: 1px solid #c7d9f8;
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent);
    white-space: pre-wrap;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    font-size: 14px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }

  .message, .tool-panel, .thinking {
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    padding: 8px 24px;
  }

  .msg-role {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .msg-role.user { color: var(--accent); }
  .msg-role.assistant { color: var(--success); }
  .msg-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
  }

  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }
  .msg-content code {
    background: #eef2f7;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }

  .msg-content pre {
    background: #0f172a;
    color: #e2e8f0;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 8px 0;
  }

  .msg-content pre code { background: none; padding: 0; }
  .msg-content ul, .msg-content ol { padding-left: 20px; margin: 6px 0; }
  .msg-content a { color: var(--accent); text-decoration: none; }

  .tool-call {
    border: 1px solid var(--tool-border);
    border-radius: var(--radius-sm);
    background: var(--tool-bg);
    overflow: hidden;
    margin-bottom: 4px;
  }

  .tool-call-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
  }

  .tool-call-header .chevron { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; }
  .tool-call-header.open .chevron { transform: rotate(90deg); }
  .tool-tag {
    background: var(--accent-dim);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .tool-status { margin-left: auto; font-size: 11px; color: var(--text-muted); }
  .tool-status.done { color: var(--success); }
  .tool-status.running { color: var(--warning); }
  .tool-call-body {
    display: none;
    border-top: 1px solid var(--tool-border);
    padding: 10px 12px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    line-height: 1.6;
  }
  .tool-call-body.open { display: block; }
  .tool-call-body .label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 4px;
    margin-top: 8px;
  }
  .tool-call-body .label:first-child { margin-top: 0; }
  .tool-call-body pre {
    background: #eef4fb;
    padding: 8px 10px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-secondary);
  }

  .thinking-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .thinking-dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
  }

  .input-container {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrapper { flex: 1; }
  #input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
  }
  #input:focus { border-color: var(--accent); }
  #send-btn {
    width: 42px;
    height: 42px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
  }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .message, .tool-panel, .thinking { padding-left: 16px; padding-right: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Memory Agent</h1>
    <div class="subtitle">实验 02 — 分层记忆 + 会话隔离</div>
  </div>

  <div class="sidebar-section">
    <h3>连接状态</h3>
    <div class="status-item">
      <span class="label"><span class="connection-dot connecting" id="conn-dot"></span><span id="conn-text">连接中...</span></span>
      <span class="value small" id="session-id">-</span>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>当前 Session</h3>
    <div class="status-item"><span class="label">消息数</span><span class="value" id="mem-count">0</span></div>
    <div class="status-item"><span class="label">已摘要条数</span><span class="value" id="summarized-count">0</span></div>
    <div class="status-item"><span class="label">摘要</span><span class="value small" id="mem-summary">(无)</span></div>
  </div>

  <div class="sidebar-section">
    <h3>长期记忆</h3>
    <div class="status-item"><span class="label">用户长期记忆</span><span class="value small" id="user-facts">0</span></div>
    <div class="memory-help">点击下面的条目可以查看这条用户记忆记录了什么，以及它来自哪里。</div>
    <div class="memory-list" id="user-facts-list">
      <div class="memory-empty">暂无用户长期记忆</div>
    </div>
    <div class="status-item" style="margin-top: 12px;"><span class="label">项目长期记忆</span><span class="value" id="project-facts">0</span></div>
    <div class="memory-help">点击下面的条目可以查看这条项目记忆记录了什么，以及它来自哪里。</div>
    <div class="memory-list" id="project-facts-list">
      <div class="memory-empty">暂无项目长期记忆</div>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>记忆 Skills</h3>
    <div id="memory-skills-list"></div>
    <button class="btn btn-summarize" id="summarize-btn" style="margin-top:10px">立即压缩会话</button>
  </div>

  <div class="sidebar-section">
    <h3>能力</h3>
    <div id="tools-list"></div>
  </div>

  <div class="sidebar-actions">
    <button class="btn btn-danger" id="clear-btn">清除当前 Session</button>
  </div>
</aside>

<div class="main">
  <div class="chat-header">
    <span>对话</span>
    <span style="font-size:12px; color:var(--text-muted);">claude-sonnet-4.5</span>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
      </div>
      <button id="send-btn" title="发送">&#8593;</button>
    </div>
  </div>
</div>

<script>
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, __, code) => `<pre><code>${code.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

let ws = null;
let busy = false;
let reconnectTimer = null;
let thinkingEl = null;
let currentToolPanelContainer = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const connDot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');
const sessionIdEl = document.getElementById('session-id');
const memCount = document.getElementById('mem-count');
const memSummary = document.getElementById('mem-summary');
const summarizedCount = document.getElementById('summarized-count');
const userFacts = document.getElementById('user-facts');
const userFactsList = document.getElementById('user-facts-list');
const projectFacts = document.getElementById('project-facts');
const projectFactsList = document.getElementById('project-facts-list');
const toolsList = document.getElementById('tools-list');
const memorySkillsList = document.getElementById('memory-skills-list');
const summarizeBtn = document.getElementById('summarize-btn');
const clearBtn = document.getElementById('clear-btn');

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  setStatus('connecting');

  ws.onopen = () => {
    setStatus('connected');
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
  };

  ws.onclose = () => {
    setStatus('disconnected');
    ws = null;
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {};
  ws.onmessage = (ev) => {
    try {
      handleMessage(JSON.parse(ev.data));
    } catch {}
  };
}

function setStatus(status) {
  connDot.className = 'connection-dot ' + status;
  connText.textContent = { connected: '已连接', disconnected: '已断开', connecting: '连接中...' }[status] || status;
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'session_ready':
      sessionIdEl.textContent = msg.sessionId;
      break;
    case 'history':
      messagesEl.innerHTML = '';
      currentToolPanelContainer = null;
      for (const item of msg.messages) appendChatMessage(item.role, item.content);
      scrollToBottom();
      break;
    case 'user_echo':
      removeThinking();
      appendChatMessage('user', msg.content);
      setBusy(true);
      break;
    case 'thinking':
      showThinking();
      break;
    case 'tool_call':
      removeThinking();
      appendToolCall(msg.name, msg.input);
      break;
    case 'tool_result':
      updateToolResult(msg.name, msg.result);
      break;
    case 'answer':
      removeThinking();
      currentToolPanelContainer = null;
      appendChatMessage('assistant', msg.content);
      setBusy(false);
      break;
    case 'error':
      removeThinking();
      appendError(msg.message);
      setBusy(false);
      break;
    case 'memory_status':
      memCount.textContent = msg.count;
      summarizedCount.textContent = msg.summarizedMessageCount || 0;
      memSummary.textContent = msg.summary || '(无)';
      memSummary.title = msg.summary || '';
      userFacts.textContent = msg.userFactCount || 0;
      renderUserFacts(msg.userFacts || []);
      projectFacts.textContent = msg.projectFactCount || 0;
      renderProjectFacts(msg.projectFacts || []);
      if (msg.sessionId) sessionIdEl.textContent = msg.sessionId;
      break;
    case 'force_summarize_result':
      appendSystemMessage(
        msg.summarized === 0
          ? '当前没有可压缩的消息。'
          : `📝 已压缩 ${msg.summarized} 条消息\n\n${msg.summary}`
      );
      summarizeBtn.disabled = false;
      break;
    case 'memory_cleared':
      messagesEl.innerHTML = '';
      currentToolPanelContainer = null;
      break;
    case 'tools_list':
      renderTools(msg.tools);
      break;
  }
  scrollToBottom();
}

function appendChatMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-role ${role}">${role === 'user' ? '你' : 'Agent'}</div>
    <div class="msg-content">${renderMarkdown(content)}</div>
  `;
  messagesEl.appendChild(div);
}

function renderUserFacts(facts) {
  if (!facts.length) {
    userFactsList.innerHTML = '<div class="memory-empty">暂无用户长期记忆</div>';
    return;
  }

  userFactsList.innerHTML = facts.map((fact) => renderMemoryItem(fact, explainUserFact(fact))).join('');
}

function renderProjectFacts(facts) {
  if (!facts.length) {
    projectFactsList.innerHTML = '<div class="memory-empty">暂无项目长期记忆</div>';
    return;
  }

  projectFactsList.innerHTML = facts.map((fact) => renderMemoryItem(fact, explainProjectFact(fact))).join('');
}

function renderMemoryItem(fact, explanation) {
  return `
    <details class="memory-item">
      <summary>
        <div class="memory-item-title">
          <div class="memory-item-key">${escapeHtml(fact.key || '(unknown)')}</div>
          <div class="memory-item-value">${escapeHtml(String(fact.value || '(空)'))}</div>
        </div>
        <span class="memory-item-arrow">▶</span>
      </summary>
      <div class="memory-item-body">
        <div class="line"><strong>说明：</strong>${escapeHtml(explanation)}</div>
        <div class="line"><strong>键：</strong><code>${escapeHtml(fact.key || '(unknown)')}</code></div>
        <div class="line"><strong>值：</strong>${escapeHtml(String(fact.value || '(空)'))}</div>
        <div class="line"><strong>来源：</strong>${escapeHtml(fact.source || '未知')}</div>
        <div class="line"><strong>置信度：</strong>${escapeHtml(fact.confidence || '未知')}</div>
        <div class="line"><strong>最近更新：</strong>${escapeHtml(formatDateTime(fact.updatedAt))}</div>
      </div>
    </details>
  `;
}

function explainUserFact(fact) {
  if (fact.key === 'profile.name') {
    return `记录了用户希望被称呼为 ${fact.value}。`;
  }
  if (fact.key === 'profile.occupation') {
    return `记录了用户的职业或身份是 ${fact.value}。`;
  }
  if (fact.key === 'profile.experienceYears') {
    return `记录了用户的经验年限是 ${fact.value} 年。`;
  }
  if (fact.key === 'profile.languagePreference') {
    return `记录了用户偏好的回答语言是 ${fact.value}。`;
  }
  if (fact.key === 'profile.responseStyle') {
    return `记录了用户偏好的回答风格是 ${fact.value}。`;
  }
  return `这条记录表示用户长期记忆里保存了 ${fact.key} = ${fact.value}。`;
}

function explainProjectFact(fact) {
  if (fact.key === 'active.topic') {
    return `当前项目正在长期关注的主题是 ${fact.value}。`;
  }
  return `这条记录表示项目记忆里保存了 ${fact.key} = ${fact.value}。`;
}

function formatDateTime(value) {
  if (!value) return '未知';
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString('zh-CN');
}

function showThinking() {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = `
    <div class="thinking-indicator">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      思考中...
    </div>
  `;
  thinkingEl = div;
  messagesEl.appendChild(div);
}

function removeThinking() {
  if (!thinkingEl) return;
  thinkingEl.remove();
  thinkingEl = null;
}

function getOrCreateToolPanel() {
  if (!currentToolPanelContainer) {
    currentToolPanelContainer = document.createElement('div');
    currentToolPanelContainer.className = 'tool-panel';
    messagesEl.appendChild(currentToolPanelContainer);
  }
  return currentToolPanelContainer;
}

function appendToolCall(name, input) {
  const container = getOrCreateToolPanel();
  const div = document.createElement('div');
  div.className = 'tool-call';
  div.dataset.toolName = name;
  div.innerHTML = `
    <div class="tool-call-header" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open')">
      <span class="chevron">&#9654;</span>
      <span class="tool-tag">${escapeHtml(name)}</span>
      <span style="color:var(--text-secondary); font-size:12px;">${escapeHtml(formatInput(input))}</span>
      <span class="tool-status running">运行中...</span>
    </div>
    <div class="tool-call-body">
      <div class="label">参数</div>
      <pre>${escapeHtml(JSON.stringify(input, null, 2))}</pre>
      <div class="label">结果</div>
      <pre class="tool-result-content">等待中...</pre>
    </div>
  `;
  container.appendChild(div);
}

function updateToolResult(name, result) {
  const panels = document.querySelectorAll(`.tool-call[data-tool-name="${name}"]`);
  for (let i = panels.length - 1; i >= 0; i--) {
    const status = panels[i].querySelector('.tool-status');
    if (!status || !status.classList.contains('running')) continue;
    status.textContent = '完成';
    status.className = 'tool-status done';
    const resultEl = panels[i].querySelector('.tool-result-content');
    if (resultEl) resultEl.textContent = result.length > 500 ? result.slice(0, 500) + '...' : result;
    break;
  }
}

function appendError(message) {
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `<div class="msg-role" style="color:var(--error)">错误</div><div class="msg-content" style="color:var(--error)">${escapeHtml(message)}</div>`;
  messagesEl.appendChild(div);
}

function appendSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'system-msg';
  div.innerHTML = `<div class="system-msg-inner">${escapeHtml(text)}</div>`;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function renderTools(toolsArr) {
  const MEMORY_SKILLS = new Set(['memory_upsert', 'memory_query']);
  const capabilityIcons = { get_current_time: '🕐', calculator: '🔢', read_file: '📄', web_fetch: '🌐' };

  const memoryTools = toolsArr.filter((t) => MEMORY_SKILLS.has(t.name));
  const capTools = toolsArr.filter((t) => !MEMORY_SKILLS.has(t.name));

  memorySkillsList.innerHTML = memoryTools.map((tool) => `
    <div class="skill-item">
      <div class="skill-info">
        <div class="skill-name">${escapeHtml(tool.name)}</div>
        <div class="skill-desc">${escapeHtml(tool.description.slice(0, 60))}…</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" checked onchange="onToolToggle('${escapeHtml(tool.name)}', this.checked)">
        <span class="toggle-track"></span>
      </label>
    </div>
  `).join('');

  toolsList.innerHTML = capTools.map((tool) => `
    <div class="tool-item">
      <div class="tool-icon">${capabilityIcons[tool.name] || '🔧'}</div>
      <div>
        <div class="tool-name">${escapeHtml(tool.name)}</div>
        <div class="tool-desc">${escapeHtml(tool.description)}</div>
      </div>
    </div>
  `).join('');
}

function setBusy(nextBusy) {
  busy = nextBusy;
  sendBtn.disabled = nextBusy;
  summarizeBtn.disabled = nextBusy;
  inputEl.disabled = nextBusy;
  if (!nextBusy) inputEl.focus();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatInput(input) {
  if (!input || typeof input !== 'object') return '';
  const first = Object.values(input)[0];
  const text = String(first || '');
  return text.length > 40 ? text.slice(0, 40) + '...' : text;
}

function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  send({ type: 'chat', content: text });
}

inputEl.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', sendMessage);
summarizeBtn.addEventListener('click', () => {
  summarizeBtn.disabled = true;
  send({ type: 'force_summarize' });
});
clearBtn.addEventListener('click', () => {
  if (confirm('确定要清除当前浏览器会话的 session 历史吗？user/project memory 会保留。')) {
    send({ type: 'clear_memory' });
  }
});

function onToolToggle(name, enabled) {
  send({ type: 'set_tool_enabled', name, enabled });
}

connect();
</script>
</body>
</html>
