<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --surface: #1e2a4a;
    --surface-hover: #253556;
    --border: #2a3a5c;
    --text: #e0e0e0;
    --text-secondary: #8892a8;
    --text-muted: #5a6478;
    --accent: #4a9eff;
    --accent-dim: #2a6ecc;
    --user-bg: #2a4a7a;
    --assistant-bg: #1e2a4a;
    --tool-bg: #1a2840;
    --tool-border: #2a4060;
    --success: #4ade80;
    --error: #f87171;
    --warning: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .sidebar-header .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .sidebar-section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .status-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
  }

  .status-item .label { color: var(--text-secondary); }
  .status-item .value { color: var(--text); font-weight: 500; }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }

  .connection-dot.connected { background: var(--success); }
  .connection-dot.disconnected { background: var(--error); }
  .connection-dot.connecting { background: var(--warning); }

  .tool-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 10px;
    margin-bottom: 4px;
    background: var(--surface);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }

  .tool-item .tool-icon {
    flex-shrink: 0;
    width: 20px;
    text-align: center;
    color: var(--accent);
    font-size: 12px;
    margin-top: 1px;
  }

  .tool-item .tool-name {
    font-weight: 500;
    color: var(--text);
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .tool-item .tool-desc {
    color: var(--text-secondary);
    font-size: 11px;
    margin-top: 2px;
  }

  .sidebar-actions {
    padding: 16px 20px;
    margin-top: auto;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
  }

  .btn:hover { background: var(--surface-hover); }

  .btn-danger {
    border-color: #5a2020;
    color: var(--error);
  }

  .btn-danger:hover { background: #3a1818; }

  /* ---- Main chat area ---- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .chat-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    font-size: 14px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .message {
    padding: 8px 24px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }

  .message + .message { margin-top: 4px; }

  .msg-role {
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .msg-role.user { color: var(--accent); }
  .msg-role.assistant { color: var(--success); }

  .msg-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .msg-content p { margin-bottom: 8px; }
  .msg-content p:last-child { margin-bottom: 0; }

  .msg-content code {
    background: rgba(255, 255, 255, 0.08);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
  }

  .msg-content pre {
    background: rgba(0, 0, 0, 0.3);
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    overflow-x: auto;
    margin: 8px 0;
  }

  .msg-content pre code {
    background: none;
    padding: 0;
    font-size: 13px;
    line-height: 1.5;
  }

  .msg-content ul, .msg-content ol {
    padding-left: 20px;
    margin: 6px 0;
  }

  .msg-content li { margin: 3px 0; }

  .msg-content strong { color: #fff; }

  .msg-content a {
    color: var(--accent);
    text-decoration: none;
  }

  .msg-content a:hover { text-decoration: underline; }

  /* Tool call panel */
  .tool-panel {
    max-width: 800px;
    margin: 4px auto;
    padding: 0 24px;
    width: 100%;
  }

  .tool-call {
    border: 1px solid var(--tool-border);
    border-radius: var(--radius-sm);
    background: var(--tool-bg);
    overflow: hidden;
    margin-bottom: 4px;
  }

  .tool-call-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    transition: background 0.15s;
  }

  .tool-call-header:hover { background: rgba(255, 255, 255, 0.03); }

  .tool-call-header .chevron {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }

  .tool-call-header.open .chevron { transform: rotate(90deg); }

  .tool-call-header .tool-tag {
    background: var(--accent-dim);
    color: #fff;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .tool-call-header .tool-status {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }

  .tool-call-header .tool-status.done { color: var(--success); }
  .tool-call-header .tool-status.running { color: var(--warning); }

  .tool-call-body {
    display: none;
    border-top: 1px solid var(--tool-border);
    padding: 10px 12px;
    font-size: 12px;
    font-family: "SF Mono", "Fira Code", monospace;
    line-height: 1.6;
  }

  .tool-call-body.open { display: block; }

  .tool-call-body .label {
    color: var(--text-muted);
    font-size: 11px;
    text-transform: uppercase;
    margin-bottom: 4px;
    margin-top: 8px;
  }

  .tool-call-body .label:first-child { margin-top: 0; }

  .tool-call-body pre {
    background: rgba(0, 0, 0, 0.2);
    padding: 8px 10px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-secondary);
  }

  /* Thinking indicator */
  .thinking {
    max-width: 800px;
    margin: 4px auto;
    padding: 0 24px;
    width: 100%;
  }

  .thinking-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface);
    border-radius: 20px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .thinking-dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: blink 1.4s infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ---- Input area ---- */
  .input-area {
    padding: 16px 24px 20px;
    background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrapper {
    flex: 1;
    position: relative;
  }

  #input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.15s;
  }

  #input::placeholder { color: var(--text-muted); }
  #input:focus { border-color: var(--accent); }

  #send-btn {
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border: none;
    border-radius: var(--radius);
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, opacity 0.15s;
  }

  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .message, .tool-panel, .thinking { padding-left: 16px; padding-right: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>Memory Agent</h1>
    <div class="subtitle">实验 02 — 带记忆的 AI 助手</div>
  </div>

  <div class="sidebar-section">
    <h3>连接状态</h3>
    <div class="status-item">
      <span class="label"><span class="connection-dot connecting" id="conn-dot"></span><span id="conn-text">连接中...</span></span>
    </div>
  </div>

  <div class="sidebar-section">
    <h3>记忆状态</h3>
    <div class="status-item">
      <span class="label">消息数</span>
      <span class="value" id="mem-count">0</span>
    </div>
    <div class="status-item">
      <span class="label">摘要</span>
      <span class="value" id="mem-summary" style="font-size:11px; max-width:140px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">(无)</span>
    </div>
  </div>

  <div class="sidebar-section" id="tools-section">
    <h3>可用工具</h3>
    <div id="tools-list"></div>
  </div>

  <div class="sidebar-actions">
    <button class="btn btn-danger" id="clear-btn">清除记忆</button>
  </div>
</aside>

<!-- Main area -->
<div class="main">
  <div class="chat-header">
    <span>对话</span>
    <span id="model-tag" style="font-size:12px; color:var(--text-muted);">claude-sonnet-4.5</span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-container">
      <div class="input-wrapper">
        <textarea id="input" rows="1" placeholder="输入消息..." autofocus></textarea>
      </div>
      <button id="send-btn" title="发送">&#8593;</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// Simple Markdown renderer
// ============================================================
function renderMarkdown(text) {
  if (!text) return '';
  let html = text
    // Escape HTML
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    // Code blocks
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.trim()}</code></pre>`)
    // Inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // Bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // Italic
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // Links
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
    // Lists
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
    // Numbered lists
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // Paragraphs
    .replace(/\n\n/g, '</p><p>')
    // Line breaks
    .replace(/\n/g, '<br>');
  return `<p>${html}</p>`;
}

// ============================================================
// State
// ============================================================
let ws = null;
let busy = false;
let reconnectTimer = null;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const connDot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');
const memCount = document.getElementById('mem-count');
const memSummary = document.getElementById('mem-summary');
const toolsList = document.getElementById('tools-list');
const clearBtn = document.getElementById('clear-btn');

// ============================================================
// WebSocket
// ============================================================
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  setStatus('connecting');

  ws.onopen = () => {
    setStatus('connected');
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onclose = () => {
    setStatus('disconnected');
    ws = null;
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {};

  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    handleMessage(msg);
  };
}

function setStatus(s) {
  connDot.className = 'connection-dot ' + s;
  const labels = { connected: '已连接', disconnected: '已断开', connecting: '连接中...' };
  connText.textContent = labels[s] || s;
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
  }
}

// ============================================================
// Message handler
// ============================================================

// Track the current thinking indicator and tool panel container
let thinkingEl = null;
let currentToolPanelContainer = null;

function handleMessage(msg) {
  switch (msg.type) {
    case 'history':
      // Render chat history on connect
      messagesEl.innerHTML = '';
      for (const m of msg.messages) {
        appendChatMessage(m.role, m.content);
      }
      scrollToBottom();
      break;

    case 'user_echo':
      removeThinking();
      appendChatMessage('user', msg.content);
      setBusy(true);
      scrollToBottom();
      break;

    case 'thinking':
      showThinking();
      scrollToBottom();
      break;

    case 'tool_call':
      removeThinking();
      appendToolCall(msg.name, msg.input);
      scrollToBottom();
      break;

    case 'tool_result':
      updateToolResult(msg.name, msg.result);
      scrollToBottom();
      break;

    case 'answer':
      removeThinking();
      currentToolPanelContainer = null;
      appendChatMessage('assistant', msg.content);
      setBusy(false);
      scrollToBottom();
      break;

    case 'error':
      removeThinking();
      appendError(msg.message);
      setBusy(false);
      scrollToBottom();
      break;

    case 'memory_status':
      memCount.textContent = msg.count;
      memSummary.textContent = msg.summary || '(无)';
      memSummary.title = msg.summary || '';
      break;

    case 'memory_cleared':
      messagesEl.innerHTML = '';
      break;

    case 'tools_list':
      renderTools(msg.tools);
      break;
  }
}

// ============================================================
// UI helpers
// ============================================================
function appendChatMessage(role, content) {
  const div = document.createElement('div');
  div.className = 'message';
  const label = role === 'user' ? '你' : 'Agent';
  div.innerHTML = `
    <div class="msg-role ${role}">${label}</div>
    <div class="msg-content">${renderMarkdown(content)}</div>
  `;
  messagesEl.appendChild(div);
}

function showThinking() {
  removeThinking();
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = `
    <div class="thinking-indicator">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      思考中...
    </div>
  `;
  thinkingEl = div;
  messagesEl.appendChild(div);
}

function removeThinking() {
  if (thinkingEl) {
    thinkingEl.remove();
    thinkingEl = null;
  }
}

function getOrCreateToolPanel() {
  if (!currentToolPanelContainer) {
    currentToolPanelContainer = document.createElement('div');
    currentToolPanelContainer.className = 'tool-panel';
    messagesEl.appendChild(currentToolPanelContainer);
  }
  return currentToolPanelContainer;
}

function appendToolCall(name, input) {
  const container = getOrCreateToolPanel();
  const div = document.createElement('div');
  div.className = 'tool-call';
  div.dataset.toolName = name;
  div.innerHTML = `
    <div class="tool-call-header" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open')">
      <span class="chevron">&#9654;</span>
      <span class="tool-tag">${escapeHtml(name)}</span>
      <span style="color:var(--text-secondary); font-size:12px;">${escapeHtml(formatInput(input))}</span>
      <span class="tool-status running">运行中...</span>
    </div>
    <div class="tool-call-body">
      <div class="label">参数</div>
      <pre>${escapeHtml(JSON.stringify(input, null, 2))}</pre>
      <div class="label">结果</div>
      <pre class="tool-result-content">等待中...</pre>
    </div>
  `;
  container.appendChild(div);
}

function updateToolResult(name, result) {
  // Find the last tool-call with matching name that's still "running"
  const panels = document.querySelectorAll(`.tool-call[data-tool-name="${name}"]`);
  for (let i = panels.length - 1; i >= 0; i--) {
    const status = panels[i].querySelector('.tool-status');
    if (status && status.classList.contains('running')) {
      status.textContent = '完成';
      status.className = 'tool-status done';
      const resultEl = panels[i].querySelector('.tool-result-content');
      if (resultEl) {
        const display = result.length > 500 ? result.substring(0, 500) + '...' : result;
        resultEl.textContent = display;
      }
      break;
    }
  }
}

function appendError(message) {
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `
    <div class="msg-role" style="color:var(--error)">错误</div>
    <div class="msg-content" style="color:var(--error)">${escapeHtml(message)}</div>
  `;
  messagesEl.appendChild(div);
}

function renderTools(toolsArr) {
  const icons = { get_current_time: '🕐', calculator: '🔢', read_file: '📄', web_fetch: '🌐' };
  toolsList.innerHTML = toolsArr.map(t => `
    <div class="tool-item">
      <div class="tool-icon">${icons[t.name] || '🔧'}</div>
      <div>
        <div class="tool-name">${escapeHtml(t.name)}</div>
        <div class="tool-desc">${escapeHtml(t.description)}</div>
      </div>
    </div>
  `).join('');
}

function setBusy(b) {
  busy = b;
  sendBtn.disabled = b;
  inputEl.disabled = b;
  if (!b) inputEl.focus();
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatInput(input) {
  if (!input || typeof input !== 'object') return '';
  const vals = Object.values(input);
  if (vals.length === 0) return '';
  const s = String(vals[0]);
  return s.length > 40 ? s.substring(0, 40) + '...' : s;
}

// ============================================================
// Input handling
// ============================================================
function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  send({ type: 'chat', content: text });
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', sendMessage);

clearBtn.addEventListener('click', () => {
  if (confirm('确定要清除所有记忆吗？此操作不可撤销。')) {
    send({ type: 'clear_memory' });
  }
});

// ============================================================
// Start
// ============================================================
connect();
</script>
</body>
</html>
