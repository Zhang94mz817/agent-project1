<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f6f8fb;
    --surface: #ffffff;
    --border: #d8e1ec;
    --text: #18212f;
    --text-secondary: #526072;
    --text-muted: #7a8797;
    --accent: #2563eb;
    --success: #16a34a;
    --error: #dc2626;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

  .app { display: grid; grid-template-columns: 320px 1fr 300px; grid-template-rows: 48px 1fr 120px; height: 100vh; }

  .header { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .subtitle { font-size: 12px; color: var(--text-muted); }
  .status-badge { margin-left: auto; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #f1f5f9; color: var(--text-secondary); border: 1px solid var(--border); }
  .status-badge.busy { background: #fef3c7; color: #92400e; border-color: #fde68a; }

  .panel-plan { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-exec { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .panel-reflect { background: var(--surface); display: flex; flex-direction: column; overflow: hidden; }

  .panel-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .panel-header h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); }
  .panel-body { flex: 1; overflow-y: auto; padding: 14px 16px; }

  .input-area { grid-column: 1 / -1; background: var(--surface); border-top: 1px solid var(--border); padding: 14px 20px; display: flex; gap: 10px; align-items: flex-end; }
  .input-area textarea { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px; font-family: inherit; resize: none; outline: none; min-height: 40px; max-height: 100px; background: var(--bg); color: var(--text); }
  .input-area textarea:focus { border-color: var(--accent); }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
  .btn-danger { background: #fee2e2; color: var(--error); border: 1px solid #fca5a5; }
  .btn-danger:hover:not(:disabled) { background: #fecaca; }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { background: #f1f5f9; }

  .plan-empty { color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center; }
  .plan-goal { font-size: 13px; color: var(--text-secondary); background: #f1f5f9; border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; line-height: 1.5; }
  .step-item { border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; background: var(--surface); transition: border-color 0.2s, background 0.2s; }
  .step-item.running { border-color: var(--accent); background: #eff6ff; }
  .step-item.done { border-color: #bbf7d0; background: #f0fdf4; }
  .step-item.failed { border-color: #fca5a5; background: #fff1f2; }
  .step-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--border); color: var(--text-secondary); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-item.running .step-num { background: var(--accent); color: #fff; }
  .step-item.done .step-num { background: var(--success); color: #fff; }
  .step-item.failed .step-num { background: var(--error); color: #fff; }
  .step-title { font-size: 13px; font-weight: 500; flex: 1; }
  .step-tool { font-size: 11px; color: var(--text-muted); background: #f1f5f9; border-radius: 4px; padding: 2px 6px; }
  .step-reason { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

  .plan-actions { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
  .btn-row { display: flex; gap: 8px; }
  .reject-input { display: none; width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 10px; font-size: 13px; font-family: inherit; outline: none; }
  .reject-input:focus { border-color: var(--error); }
  .reject-input.visible { display: block; }

  .exec-log { display: flex; flex-direction: column; gap: 8px; }
  .log-item { border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; line-height: 1.5; }
  .log-item.info { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); }
  .log-item.step-start { background: #eff6ff; border: 1px solid #bfdbfe; }
  .log-item.step-done { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .log-item.step-failed { background: #fff1f2; border: 1px solid #fca5a5; }
  .log-label { font-weight: 600; margin-bottom: 2px; font-size: 12px; color: var(--text-muted); }
  .log-content { word-break: break-word; white-space: pre-wrap; }

  .reflect-empty { color: var(--text-muted); font-size: 13px; padding: 20px 0; text-align: center; }
  .reflect-content { font-size: 13px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1>Planning Agent</h1>
    <span class="subtitle">实验 03：Plan → Execute → Reflect</span>
    <span class="status-badge" id="statusBadge">连接中…</span>
  </header>

  <div class="panel-plan">
    <div class="panel-header"><h2>执行计划</h2></div>
    <div class="panel-body" id="planBody">
      <div class="plan-empty" id="planEmpty">输入目标后，计划将显示在这里</div>
    </div>
    <div class="plan-actions" id="planActions" style="display:none">
      <div class="btn-row">
        <button class="btn btn-primary" id="approveBtn" onclick="approvePlan()">确认执行</button>
        <button class="btn btn-danger" id="rejectBtn" onclick="toggleReject()">修改计划</button>
      </div>
      <input class="reject-input" id="rejectInput" placeholder="说明修改意见（可选）" />
      <div class="btn-row" id="rejectConfirmRow" style="display:none">
        <button class="btn btn-ghost" onclick="submitReject()">提交修改意见</button>
      </div>
    </div>
  </div>

  <div class="panel-exec">
    <div class="panel-header"><h2>执行过程</h2></div>
    <div class="panel-body"><div class="exec-log" id="execLog"></div></div>
  </div>

  <div class="panel-reflect">
    <div class="panel-header"><h2>反思报告</h2></div>
    <div class="panel-body">
      <div class="reflect-empty" id="reflectEmpty">执行完成后，反思报告将显示在这里</div>
      <div class="reflect-content" id="reflectContent" style="display:none"></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="inputEl" placeholder="输入你的任务目标，例如：查询当前时间，然后计算 2 的 10 次方" rows="1"></textarea>
    <button class="btn btn-primary" id="sendBtn" onclick="sendGoal()">发送</button>
  </div>
</div>

<script>
const inputEl = document.getElementById('inputEl');
const sendBtn = document.getElementById('sendBtn');
const statusBadge = document.getElementById('statusBadge');
const planBody = document.getElementById('planBody');
const planEmpty = document.getElementById('planEmpty');
const planActions = document.getElementById('planActions');
const approveBtn = document.getElementById('approveBtn');
const rejectBtn = document.getElementById('rejectBtn');
const rejectInput = document.getElementById('rejectInput');
const rejectConfirmRow = document.getElementById('rejectConfirmRow');
const execLog = document.getElementById('execLog');
const reflectEmpty = document.getElementById('reflectEmpty');
const reflectContent = document.getElementById('reflectContent');

let ws = null;
let busy = false;
let currentPlan = null;

function setStatus(text, isBusy) {
  statusBadge.textContent = text;
  statusBadge.className = 'status-badge' + (isBusy ? ' busy' : '');
  busy = isBusy;
  sendBtn.disabled = isBusy;
  inputEl.disabled = isBusy;
}

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);
  ws.onopen = () => setStatus('已连接', false);
  ws.onclose = () => { setStatus('已断开', false); setTimeout(connect, 2000); };
  ws.onerror = () => setStatus('连接错误', false);
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'ready':
      setStatus('就绪', false);
      break;
    case 'planning':
      setStatus('规划中…', true);
      addLog('info', '🤔 ' + msg.message);
      currentPlan = null;
      planActions.style.display = 'none';
      planEmpty.textContent = '正在生成计划…';
      planEmpty.style.display = 'block';
      planBody.querySelectorAll('.plan-goal, .step-item').forEach(el => el.remove());
      reflectEmpty.style.display = 'block';
      reflectContent.style.display = 'none';
      break;
    case 'plan_ready':
      currentPlan = msg.plan;
      renderPlan(msg.plan);
      setStatus('等待确认', true);
      break;
    case 'executing':
      setStatus('执行中…', true);
      addLog('info', '⚙️ ' + msg.message);
      planActions.style.display = 'none';
      break;
    case 'step_start':
      updateStepUI(msg.stepId, 'running');
      addLog('step-start', `▶ 步骤 ${msg.stepId}：${msg.title}`, msg.tool !== 'none' ? `工具：${msg.tool}` : null);
      break;
    case 'step_done':
      updateStepUI(msg.stepId, 'done');
      addLog('step-done', `✓ 步骤 ${msg.stepId} 完成`, msg.result);
      break;
    case 'reflecting':
      setStatus('反思中…', true);
      addLog('info', '💭 ' + msg.message);
      break;
    case 'reflect_ready':
      reflectEmpty.style.display = 'none';
      reflectContent.style.display = 'block';
      reflectContent.textContent = msg.reflection;
      setStatus('完成', false);
      addLog('info', '✅ 任务完成');
      break;
    case 'error':
      setStatus('出错', false);
      addLog('step-failed', '❌ 错误', msg.message);
      planActions.style.display = 'none';
      break;
  }
}

function renderPlan(plan) {
  planEmpty.style.display = 'none';
  planBody.querySelectorAll('.plan-goal, .step-item').forEach(el => el.remove());

  const goalEl = document.createElement('div');
  goalEl.className = 'plan-goal';
  goalEl.textContent = '目标：' + plan.goal;
  planBody.appendChild(goalEl);

  for (const step of plan.steps) {
    const el = document.createElement('div');
    el.className = 'step-item';
    el.id = `step-${step.id}`;
    el.innerHTML = `
      <div class="step-header">
        <div class="step-num">${step.id}</div>
        <div class="step-title">${esc(step.title)}</div>
        <div class="step-tool">${esc(step.tool)}</div>
      </div>
      <div class="step-reason">${esc(step.reason)}</div>
    `;
    planBody.appendChild(el);
  }

  planActions.style.display = 'flex';
  approveBtn.disabled = false;
  rejectBtn.disabled = false;
  hideRejectInput();
}

function updateStepUI(stepId, state) {
  const el = document.getElementById(`step-${stepId}`);
  if (el) el.className = 'step-item ' + state;
}

function addLog(type, label, content) {
  const item = document.createElement('div');
  item.className = `log-item ${type}`;
  const labelEl = document.createElement('div');
  labelEl.className = 'log-label';
  labelEl.textContent = label;
  item.appendChild(labelEl);
  if (content) {
    const c = document.createElement('div');
    c.className = 'log-content';
    c.textContent = content;
    item.appendChild(c);
  }
  execLog.appendChild(item);
  execLog.parentElement.scrollTop = execLog.parentElement.scrollHeight;
}

function approvePlan() {
  if (!currentPlan) return;
  approveBtn.disabled = true;
  rejectBtn.disabled = true;
  send({ type: 'plan_approved' });
}

function toggleReject() {
  rejectInput.classList.toggle('visible');
  rejectConfirmRow.style.display = rejectInput.classList.contains('visible') ? 'flex' : 'none';
}

function hideRejectInput() {
  rejectInput.classList.remove('visible');
  rejectConfirmRow.style.display = 'none';
  rejectInput.value = '';
}

function submitReject() {
  const feedback = rejectInput.value.trim();
  approveBtn.disabled = true;
  rejectBtn.disabled = true;
  hideRejectInput();
  send({ type: 'plan_rejected', feedback });
}

function sendGoal() {
  const text = inputEl.value.trim();
  if (!text || busy) return;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  execLog.innerHTML = '';
  send({ type: 'chat', content: text });
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendGoal(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

connect();
</script>
</body>
</html>
